name: CI/CD

on:
  push:
    branches: [main, dev/*]
  pull_request:
    branches: [main, dev/*]

env:
  IMAGE_NAME: felipebhrqz/incidentflow

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check backend/

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: incidentflow
          POSTGRES_PASSWORD: incidentflow
          POSTGRES_DB: incidentflow
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest psycopg2-binary

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://incidentflow:incidentflow@localhost:5432/incidentflow
        run: |
          cd backend
          alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://incidentflow:incidentflow@localhost:5432/incidentflow
        run: PYTHONPATH=. pytest

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: success() && (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/dev/')))
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:backend-dev-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:backend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:frontend-dev-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-prod-tags:
    name: Deploy Prod Tags
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and retag for prod
        run: |
          docker pull ${{ env.IMAGE_NAME }}:backend-latest
          docker pull ${{ env.IMAGE_NAME }}:frontend-latest
          docker tag ${{ env.IMAGE_NAME }}:backend-latest ${{ env.IMAGE_NAME }}:backend-prod
          docker tag ${{ env.IMAGE_NAME }}:frontend-latest ${{ env.IMAGE_NAME }}:frontend-prod

      - name: Push prod tags
        run: |
          docker push ${{ env.IMAGE_NAME }}:backend-prod
          docker push ${{ env.IMAGE_NAME }}:frontend-prod

  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: [build-push]
    if: startsWith(github.ref, 'refs/heads/dev/')
    steps:
      - name: Trigger Render Dev Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEV }}

  deploy-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-prod-tags]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Prod Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PROD }}
