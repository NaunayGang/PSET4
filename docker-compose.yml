services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: incidentflow
      POSTGRES_PASSWORD: incidentflow
      POSTGRES_DB: incidentflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incidentflow -d incidentflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://incidentflow:incidentflow@db:5432/incidentflow
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: